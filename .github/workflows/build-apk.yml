name: Build AURA APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libffi-dev libssl-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake
      - name: Install Buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
      - name: Build APK
        run: buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AURA-Semantic-Core-APK
          path: bin/*.apk
          retention-days: 30
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-*/**/*.log
