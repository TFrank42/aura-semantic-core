name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential libffi-dev libssl-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake

      - name: Install Buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AURA-APK
          path: bin/*.apk
          retention-days: 30
